

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatCasino Bingo</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --accent: #E53935; 
            --accent-hover: #ef5350;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --card-bg: #ffffff;
            --daub-color: rgba(229, 57, 53, 0.3);
            --daub-border: #E53935;
            --header-height: 60px;
            --input-bg: #2c2c2c;
            --input-border: #444;
            
            --cards-per-row: 1;
            --card-max-width: 400px;
        }

        body.light-mode {
            --bg-color: #f0f2f5;
            --panel-bg: #ffffff;
            --text-main: #1c1e21;
            --text-muted: #606770;
            --input-bg: #f5f6f7;
            --input-border: #ccd0d5;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-top: calc(var(--header-height) + 20px); 
            overscroll-behavior-y: contain; 
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--header-height);
            background: var(--panel-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 50;
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: background-color 0.3s;
        }

        .logo { font-size: 20px; font-weight: 900; letter-spacing: 1px;}
        .logo span { color: var(--accent); }

        .header-buttons { display: flex; gap: 10px; }
        
        .btn-small {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--input-border);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-small:hover { background: var(--input-bg); }
        .btn-small.primary { background: var(--accent); border-color: var(--accent); color: white; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: var(--panel-bg);
            width: 90%;
            max-width: 400px;
            border-radius: 12px;
            padding: 20px;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.2s, background-color 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.active .modal-content { transform: translateY(0); }

        .close-btn {
            position: absolute;
            top: 15px; right: 15px;
            font-size: 24px;
            color: var(--text-muted);
            background: none; border: none; cursor: pointer;
            line-height: 1;
        }

        h3 { margin: 0 0 15px 0; font-size: 18px; border-bottom: 1px solid var(--input-border); padding-bottom: 10px;}
        label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}
        
        input, select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
            appearance: none; 
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }
        
        select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23aaaaaa%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right .7em top 50%;
            background-size: .65em auto;
        }

        input:focus, select:focus { outline: 2px solid var(--accent); border-color: transparent; }

        .input-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .input-row input { margin-bottom: 0; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn-large {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        #cards-container {
            display: grid;
            grid-template-columns: repeat(var(--cards-per-row), minmax(0, 1fr));
            gap: 25px;
            padding: 0 15px 40px 15px;
            justify-content: center;
            align-items: start;
            max-width: 1600px;
            margin: 0 auto;
        }

        .bingo-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            width: 100%;
            max-width: var(--card-max-width); 
            margin: 0 auto;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .card-header {
            background: var(--accent);
            color: white;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            text-align: center;
            font-weight: 900;
            font-size: 24px;
            padding: 10px 0;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px; 
            background: #222; 
            padding: 2px;
        }

        body.light-mode .card-grid { background: #ddd; }

        .grid-cell {
            background: white;
            color: black;
            aspect-ratio: 1 / 1; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            user-select: none; 
        }

        .grid-cell.free-space { font-size: 14px; }

        .grid-cell.daubed::after {
            content: '';
            position: absolute;
            top: 10%; left: 10%; right: 10%; bottom: 10%;
            background-color: var(--daub-color);
            border: 3px solid var(--daub-border);
            border-radius: 50%;
            pointer-events: none; 
        }

        .card-footer {
            background: #eee;
            color: #666;
            text-align: center;
            padding: 8px;
            font-size: 12px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Chat<span>Casino</span></div>
        <div class="header-buttons">
            <button class="btn-small" onclick="openModal('setup-modal')">Setup</button>
            <button class="btn-small primary" onclick="openModal('sync-modal')">Sync</button>
        </div>
    </header>

    <div id="setup-modal" class="modal-overlay" onclick="closeModal(event, 'setup-modal')">
        <div class="modal-content">
            <button class="close-btn" onclick="document.getElementById('setup-modal').classList.remove('active')">&times;</button>
            <h3>Setup & Settings</h3>
            
            <label>My 3-Word Phrase</label>
            <div class="input-row">
                <input type="text" id="phrase-input" placeholder="e.g. apple brave cat">
                <button class="btn-small" onclick="document.getElementById('phrase-input').value = generateMasterPhrase();">Random</button>
            </div>
            
            <label>Number of Cards</label>
            <input type="number" id="count-input" value="3" min="1" max="10" onchange="updateDynamicGrid()">

            <div class="settings-grid">
                <div>
                    <label>Cards Per Row</label>
                    <select id="columns-select" onchange="updateDynamicGrid()">
                        <option value="1">1 Column</option>
                        <option value="2">2 Columns</option>
                        <option value="3" selected>3 Columns</option>
                        <option value="4">4 Columns</option>
                    </select>
                </div>
                <div>
                    <label>Card Size</label>
                    <select id="size-select" onchange="updateDynamicGrid()">
                        <option value="400px">Normal</option>
                        <option value="280px">Small</option>
                        <option value="550px">Large</option>
                        <option value="100%">Full Width</option>
                    </select>
                </div>
                <div style="grid-column: span 2;">
                    <label>App Theme</label>
                    <select id="theme-select" onchange="updateDynamicGrid()">
                        <option value="dark">Dark Mode</option>
                        <option value="light">Light Mode</option>
                    </select>
                </div>
            </div>
            
            <button class="btn-large" onclick="buildUI(); document.getElementById('setup-modal').classList.remove('active')">Generate Cards</button>
        </div>
    </div>

    <div id="sync-modal" class="modal-overlay" onclick="closeModal(event, 'sync-modal')">
        <div class="modal-content">
            <button class="close-btn" onclick="document.getElementById('sync-modal').classList.remove('active')">&times;</button>
            <h3>Sync Game State</h3>
            
            <label>Dealer's 4-Word Catchup</label>
            <input type="text" id="catchup-input" placeholder="e.g. sunset mountain river turtle">
            
            <button class="btn-large" onclick="applyCatchup(); document.getElementById('sync-modal').classList.remove('active')">Auto-Daub</button>
        </div>
    </div>

    <div id="cards-container">
        <div style="text-align: center; color: var(--text-muted); margin-top: 50px; grid-column: 1 / -1;">
            Click <strong>Setup</strong> in the top right to generate your cards.
        </div>
    </div>

function generateMasterPhrase() {
    let phrase = [];
    for (let i = 0; i < 3; i++) phrase.push(bip39Wordlist[Math.floor(Math.random() * bip39Wordlist.length)]);
    return phrase.join(" "); 
}

function hashString(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) { hash = ((hash << 5) - hash) + str.charCodeAt(i); hash = hash & hash; }
    return Math.abs(hash);
}

function createPRNG(seed) {
    return function() {
      let t = seed += 0x6D2B79F5; t = Math.imul(t ^ t >>> 15, t | 1); t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296; 
    }
}

function generateBingoCard(masterPhrase, cardIndex) {
    const random = createPRNG(hashString(`${masterPhrase}-${cardIndex}`));
    const ranges = [{ letter: 'B', min: 1, max: 15 }, { letter: 'I', min: 16, max: 30 }, { letter: 'N', min: 31, max: 45 }, { letter: 'G', min: 46, max: 60 }, { letter: 'O', min: 61, max: 75 }];
    const card = {};
    ranges.forEach(col => {
        card[col.letter] = []; let pool = [];
        for (let i = col.min; i <= col.max; i++) pool.push(i);
        for (let i = 0; i < 5; i++) {
            if (col.letter === 'N' && i === 2) { card[col.letter].push("FREE"); continue; }
            let randIndex = Math.floor(random() * pool.length);
            card[col.letter].push(pool[randIndex]);
            pool.splice(randIndex, 1);
        }
    });
    return card;
}

function getSequenceForRoom(roomName) {
    const random = createPRNG(hashString(roomName));
    let pool = []; for (let i = 1; i <= 75; i++) pool.push(i);
    let sequence = [];
    while (pool.length > 0) {
        let randIndex = Math.floor(random() * pool.length);
        sequence.push(pool[randIndex]); pool.splice(randIndex, 1);
    }
    return sequence;
}

function getCipherListForRoom(roomName) {
    const random = createPRNG(hashString(roomName));
    let cipherWords = [];
    while (cipherWords.length < 75) {
        let pickedWord = bip39Wordlist[Math.floor(random() * bip39Wordlist.length)];
        if (!cipherWords.includes(pickedWord)) cipherWords.push(pickedWord);
    }
    return cipherWords;
}

function decodeCipher(phrase) {
    let words = phrase.trim().split(/\s+/);
    if (words.length !== 4) return [];
    let roomName = `${words[0]} ${words[1]} ${words[2]}`;
    let turnWord = words[3];
    let cipherList = getCipherListForRoom(roomName);
    let sequence = getSequenceForRoom(roomName);
    let turnIndex = cipherList.indexOf(turnWord);
    if (turnIndex === -1) return []; 
    return sequence.slice(0, turnIndex + 1);
}

// --- 2. DOM, UI & SETTINGS LOGIC ---

let daubedSquares = new Set();

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(event, id) { if (event.target.id === id) document.getElementById(id).classList.remove('active'); }

// SMART GRID UPDATE
function updateDynamicGrid() {
    const theme = document.getElementById('theme-select').value;
    const requestedColumns = parseInt(document.getElementById('columns-select').value) || 1;
    const cardCount = parseInt(document.getElementById('count-input').value) || 1;
    const size = document.getElementById('size-select').value;

    // Apply Theme
    if (theme === 'light') document.body.classList.add('light-mode');
    else document.body.classList.remove('light-mode');

    // Smart Column Math: Don't render 4 columns if there are only 2 cards.
    const actualColumnsToRender = Math.min(requestedColumns, cardCount);

    document.documentElement.style.setProperty('--cards-per-row', actualColumnsToRender);
    document.documentElement.style.setProperty('--card-max-width', size);
}

window.onload = () => {
    updateDynamicGrid(); // Initialize the grid math on load
    
    let params = new URLSearchParams(window.location.search);
    let phrase = params.get('phrase');
    if (phrase) {
        document.getElementById('phrase-input').value = phrase.replace(/-/g, ' ');
        buildUI();
    }
    
    let catchup = params.get('catchup');
    if (catchup) {
        document.getElementById('catchup-input').value = catchup.replace(/-/g, ' ');
        setTimeout(applyCatchup, 100);
    }
};

function buildUI() {
    let phrase = document.getElementById('phrase-input').value.trim();
    let count = parseInt(document.getElementById('count-input').value) || 1;
    
    if (!phrase) return alert("Please enter a secret phrase!");
    
    updateDynamicGrid(); // Re-check grid math in case card count changed
    
    const container = document.getElementById('cards-container');
    container.innerHTML = ''; 

    for (let i = 1; i <= count; i++) {
        let cardData = generateBingoCard(phrase, i);
        let cardElement = createHTMLCard(cardData, i, phrase);
        container.appendChild(cardElement);
    }
}

function createHTMLCard(data, index, phrase) {
    const cardWrap = document.createElement('div');
    cardWrap.className = 'bingo-card';

    const header = document.createElement('div');
    header.className = 'card-header';
    ['B', 'I', 'N', 'G', 'O'].forEach(letter => {
        let div = document.createElement('div');
        div.innerText = letter; header.appendChild(div);
    });
    cardWrap.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'card-grid';
    const letters = ['B', 'I', 'N', 'G', 'O'];
    
    for (let row = 0; row < 5; row++) {
        for (let col = 0; col < 5; col++) {
            let val = data[letters[col]][row];
            let cellKey = `${index}-${col}-${row}`;
            let cell = document.createElement('div');
            cell.className = 'grid-cell';
            
            if (val === "FREE") cell.classList.add('free-space');
            if (daubedSquares.has(cellKey) || val === "FREE") cell.classList.add('daubed');
            
            cell.innerText = val;
            cell.onclick = () => {
                if (cell.classList.contains('daubed')) {
                    cell.classList.remove('daubed'); daubedSquares.delete(cellKey);
                } else {
                    cell.classList.add('daubed'); daubedSquares.add(cellKey);
                }
            };
            grid.appendChild(cell);
        }
    }
    cardWrap.appendChild(grid);

    const footer = document.createElement('div');
    footer.className = 'card-footer';
    footer.innerText = `Seed: ${phrase}-${index}`;
    cardWrap.appendChild(footer);

    return cardWrap;
}

function applyCatchup() {
    let catchupText = document.getElementById('catchup-input').value.trim();
    if (!catchupText) return;
    
    let decodedBalls = decodeCipher(catchupText);
    if (decodedBalls.length === 0) return alert("Invalid 4-word code. Please check for typos!");
    
    daubedSquares.clear();
    let phrase = document.getElementById('phrase-input').value.trim();
    let count = parseInt(document.getElementById('count-input').value) || 1;
    let letters = ['B', 'I', 'N', 'G', 'O'];
    
    if (phrase) {
        for (let i = 1; i <= count; i++) {
            let boardData = generateBingoCard(phrase, i);
            for (let col = 0; col < 5; col++) {
                for (let row = 0; row < 5; row++) {
                    let val = boardData[letters[col]][row];
                    if (decodedBalls.includes(val) || val === "FREE") {
                        daubedSquares.add(`${i}-${col}-${row}`);
                    }
                }
            }
        }
        buildUI(); 
    }
}
