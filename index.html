function generateMasterPhrase() {
    let phrase = [];
    for (let i = 0; i < 3; i++) {
        phrase.push(bip39Wordlist[Math.floor(Math.random() * bip39Wordlist.length)]);
    }
    return phrase.join(" "); 
}

function hashString(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash = hash & hash; 
    }
    return Math.abs(hash);
}

function createPRNG(seed) {
    return function() {
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296; 
    }
}

// Generates the Player's Cards
function generateBingoCard(masterPhrase, cardIndex) {
    const random = createPRNG(hashString(`${masterPhrase}-${cardIndex}`));
    const ranges = [{ letter: 'B', min: 1, max: 15 }, { letter: 'I', min: 16, max: 30 }, { letter: 'N', min: 31, max: 45 }, { letter: 'G', min: 46, max: 60 }, { letter: 'O', min: 61, max: 75 }];
    const card = {};
    ranges.forEach(col => {
        card[col.letter] = [];
        let pool = [];
        for (let i = col.min; i <= col.max; i++) pool.push(i);
        for (let i = 0; i < 5; i++) {
            if (col.letter === 'N' && i === 2) { card[col.letter].push("FREE"); continue; }
            let randIndex = Math.floor(random() * pool.length);
            card[col.letter].push(pool[randIndex]);
            pool.splice(randIndex, 1);
        }
    });
    return card;
}

// --- 2. THE 4-WORD CIPHER LOGIC ---

let currentRoomName = "";
let callerSequence = []; // The pre-determined order of the 75 balls
let currentTurn = 0;

// Recreates the shuffled deck of 75 balls based on the Room Name
function getSequenceForRoom(roomName) {
    const random = createPRNG(hashString(roomName));
    let pool = [];
    for (let i = 1; i <= 75; i++) pool.push(i);
    
    let sequence = [];
    while (pool.length > 0) {
        let randIndex = Math.floor(random() * pool.length);
        sequence.push(pool[randIndex]);
        pool.splice(randIndex, 1);
    }
    return sequence;
}

// Generates the master list of 75 unique "Turn Words"
function getCipherListForRoom(roomName) {
    const random = createPRNG(hashString(roomName));
    let cipherWords = [];
    while (cipherWords.length < 75) {
        let pickedWord = bip39Wordlist[Math.floor(random() * bip39Wordlist.length)];
        if (!cipherWords.includes(pickedWord)) cipherWords.push(pickedWord);
    }
    return cipherWords;
}

// Decode the 4-word phrase into the list of called balls
function decodeCipher(phrase) {
    let words = phrase.trim().split(/\s+/);
    if (words.length !== 4) return [];
    
    let roomName = `${words[0]} ${words[1]} ${words[2]}`;
    let turnWord = words[3];
    
    let cipherList = getCipherListForRoom(roomName);
    let sequence = getSequenceForRoom(roomName);
    
    let turnIndex = cipherList.indexOf(turnWord);
    if (turnIndex === -1) return []; // Invalid word
    
    // Return the sequence of balls up to that turn
    return sequence.slice(0, turnIndex + 1);
}

// --- 3. UI WIRING & P5.JS ---

let daubedSquares = new Set();
const cardWidth = 220;
const cardHeight = 280;
const padding = 20;

function setup() {
    let canvas = createCanvas(100, 100);
    canvas.parent('canvas-container');
    document.getElementById('phrase-input').value = generateMasterPhrase();
    renderAllCards();
}

function startNewGame() {
    currentRoomName = generateMasterPhrase();
    callerSequence = getSequenceForRoom(currentRoomName);
    currentTurn = 0;
    
    document.getElementById('room-name').innerText = currentRoomName;
    document.getElementById('called-list').innerText = "None";
    document.getElementById('turn-count').innerText = "0";
    document.getElementById('catchup-display').innerText = "Waiting for first draw...";
}

function drawNextBall() {
    if (!currentRoomName) return alert("Start a game first!");
    if (currentTurn >= 75) return alert("All balls drawn!");
    
    currentTurn++;
    let drawnBalls = callerSequence.slice(0, currentTurn);
    let cipherList = getCipherListForRoom(currentRoomName);
    
    let catchupCode = `${currentRoomName} ${cipherList[currentTurn - 1]}`;
    
    document.getElementById('turn-count').innerText = currentTurn;
    document.getElementById('called-list').innerText = drawnBalls.join(", ");
    document.getElementById('catchup-display').innerText = catchupCode;
}

function randomizePhrase() {
    document.getElementById('phrase-input').value = generateMasterPhrase();
    daubedSquares.clear();
    renderAllCards();
}

function applyCatchup() {
    let code = document.getElementById('auto-daub-input').value;
    let decodedBalls = decodeCipher(code);
    
    if (decodedBalls.length === 0 && code.length > 0) {
        alert("Invalid catchup code! Make sure it is exactly 4 words with no typos.");
        return;
    }

    daubedSquares.clear();
    let numCards = parseInt(document.getElementById('count-input').value) || 1;
    let phrase = document.getElementById('phrase-input').value.trim();
    let letters = ['B', 'I', 'N', 'G', 'O'];

    for (let i = 1; i <= numCards; i++) {
        let boardData = generateBingoCard(phrase, i);
        for (let col = 0; col < 5; col++) {
            for (let row = 0; row < 5; row++) {
                let val = boardData[letters[col]][row];
                if (decodedBalls.includes(val) || val === "FREE") {
                    daubedSquares.add(`${i}-${col}-${row}`);
                }
            }
        }
    }
    renderAllCards();
}

function renderAllCards() {
    let numCards = parseInt(document.getElementById('count-input').value) || 1;
    let phrase = document.getElementById('phrase-input').value.trim();
    let cols = max(1, floor((windowWidth - padding * 2) / (cardWidth + padding)));
    let rows = ceil(numCards / cols);
    resizeCanvas(cols * (cardWidth + padding) + padding, rows * (cardHeight + padding) + padding);
    background(43);

    let currentCard = 1;
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            if (currentCard > numCards) break;
            let x = padding + c * (cardWidth + padding);
            let y = padding + r * (cardHeight + padding);
            let boardData = generateBingoCard(phrase, currentCard);
            drawCard(x, y, boardData, currentCard, phrase);
            currentCard++;
        }
    }
}

function drawCard(x, y, data, index, masterPhrase) {
    push(); translate(x, y);
    fill(255); stroke(0); strokeWeight(2); rect(0, 0, cardWidth, cardHeight, 10);
    fill(200, 50, 50); rect(0, 0, cardWidth, 40, 10, 10, 0, 0);
    fill(255); noStroke(); textAlign(CENTER, CENTER); textSize(24); textStyle(BOLD);
    let letters = ['B', 'I', 'N', 'G', 'O'];
    let colWidth = cardWidth / 5;
    for(let i=0; i<5; i++) text(letters[i], i * colWidth + (colWidth/2), 20);
    stroke(0); strokeWeight(1);
    
    for (let col = 0; col < 5; col++) {
        let colData = data[letters[col]];
        for (let row = 0; row < 5; row++) {
            let cellX = col * colWidth; let cellY = 40 + (row * ((cardHeight - 60) / 5)); let cellH = (cardHeight - 60) / 5;
            let val = colData[row]; let cellKey = `${index}-${col}-${row}`;
            
            if (daubedSquares.has(cellKey) || val === "FREE") fill(255, 180, 180); 
            else fill(255); 
            
            rect(cellX, cellY, colWidth, cellH);
            fill(0);
            if (val === "FREE") { textSize(12); textStyle(BOLD); } 
            else { textSize(18); textStyle(NORMAL); }
            text(val, cellX + (colWidth/2), cellY + (cellH/2));
        }
    }
    fill(150); noStroke(); textSize(12); textStyle(NORMAL);
    text(`Seed: ${masterPhrase}-${index}`, cardWidth/2, cardHeight - 10);
    pop();
}

function mousePressed() {
    let numCards = parseInt(document.getElementById('count-input').value) || 1;
    let cols = max(1, floor((windowWidth - padding * 2) / (cardWidth + padding)));
    for (let i = 0; i < numCards; i++) {
        let r = floor(i / cols); let c = i % cols;
        let x = padding + c * (cardWidth + padding); let y = padding + r * (cardHeight + padding);
        if (mouseX > x && mouseX < x + cardWidth && mouseY > y + 40 && mouseY < y + cardHeight - 20) {
            let colWidth = cardWidth / 5; let cellH = (cardHeight - 60) / 5;
            let col = floor((mouseX - x) / colWidth); let row = floor((mouseY - (y + 40)) / cellH);
            if (col >= 0 && col < 5 && row >= 0 && row < 5) {
                let cellKey = `${i + 1}-${col}-${row}`;
                if (daubedSquares.has(cellKey)) daubedSquares.delete(cellKey);
                else daubedSquares.add(cellKey);
                renderAllCards(); return; 
            }
        }
    }
}

function windowResized() { renderAllCards(); }
</script>
</body>
