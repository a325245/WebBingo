<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatCasino Bingo</title>
    <style>
        /* Modern, Dark-Mode Mobile Reset */
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --accent: #E53935; /* Casino Red */
            --accent-hover: #ef5350;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --card-bg: #ffffff;
            --daub-color: rgba(229, 57, 53, 0.3); /* Translucent Red */
            --daub-border: #E53935;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            /* Prevent pull-to-refresh on mobile */
            overscroll-behavior-y: contain; 
        }

        h1 { text-align: center; font-size: 24px; margin-bottom: 20px; color: var(--accent); }
        h3 { margin: 0 0 10px 0; font-size: 16px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;}

        /* Clean Panel Layout */
        .control-panel {
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .input-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .input-row { display: flex; gap: 10px; }
        
        label { margin-bottom: 5px; font-size: 14px; font-weight: bold; }
        
        input {
            background: #2c2c2c;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            flex-grow: 1;
            /* Prevents iOS from zooming in on inputs */
            appearance: none; 
        }
        
        input:focus { outline: 2px solid var(--accent); border-color: transparent; }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover { background: var(--accent-hover); }

        /* The CSS Grid Bingo Card */
        #cards-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
            padding-bottom: 40px;
        }

        .bingo-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            width: 100%;
            max-width: 400px; /* Looks great on desktop too */
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .card-header {
            background: var(--accent);
            color: white;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            text-align: center;
            font-weight: 900;
            font-size: 24px;
            padding: 10px 0;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px; /* Creates the grid lines automatically */
            background: #222; /* Color of the grid lines */
            padding: 2px;
        }

        .grid-cell {
            background: white;
            color: black;
            aspect-ratio: 1 / 1; /* Forces perfect squares! */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            user-select: none; /* Prevents text highlighting when tapping fast */
        }

        .grid-cell.free-space { font-size: 14px; }

        /* The Dauber Effect */
        .grid-cell.daubed::after {
            content: '';
            position: absolute;
            top: 10%; left: 10%; right: 10%; bottom: 10%;
            background-color: var(--daub-color);
            border: 3px solid var(--daub-border);
            border-radius: 50%;
            pointer-events: none; /* Lets clicks pass through to the cell */
        }

        .card-footer {
            background: #eee;
            color: #666;
            text-align: center;
            padding: 8px;
            font-size: 12px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <h1>ChatCasino Bingo</h1>

    <div class="control-panel">
        <h3>1. Get Your Cards</h3>
        <div class="input-group">
            <label>My Secret Phrase</label>
            <div class="input-row">
                <input type="text" id="phrase-input" placeholder="e.g. apple brave cat">
            </div>
        </div>
        <button onclick="buildUI()">Generate Cards</button>
    </div>

    <div class="control-panel" style="border-left: 4px solid var(--accent);">
        <h3>2. Sync Game State</h3>
        <div class="input-group">
            <label>Paste Dealer's Catchup Code</label>
            <input type="text" id="catchup-input" placeholder="e.g. sunset mountain river turtle">
        </div>
        <button onclick="applyCatchup()">Auto-Daub Cards</button>
    </div>

    <div id="cards-container">
        </div>

<script>
// --- 1. CORE MATH & DATA ---
const bip39Wordlist = ["abandon", "ability", "able", "about", "above", "absent", "blanket", "crystal", "turtle", "apple", "brave", "cat", "zebra", "zero", "zone", "zoo", "mountain", "river", "sunset", "ocean"];

function hashString(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash = hash & hash; 
    }
    return Math.abs(hash);
}

function createPRNG(seed) {
    return function() {
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296; 
    }
}

function generateBingoCard(masterPhrase, cardIndex) {
    const random = createPRNG(hashString(`${masterPhrase}-${cardIndex}`));
    const ranges = [{ letter: 'B', min: 1, max: 15 }, { letter: 'I', min: 16, max: 30 }, { letter: 'N', min: 31, max: 45 }, { letter: 'G', min: 46, max: 60 }, { letter: 'O', min: 61, max: 75 }];
    const card = {};
    ranges.forEach(col => {
        card[col.letter] = [];
        let pool = [];
        for (let i = col.min; i <= col.max; i++) pool.push(i);
        for (let i = 0; i < 5; i++) {
            if (col.letter === 'N' && i === 2) { card[col.letter].push("FREE"); continue; }
            let randIndex = Math.floor(random() * pool.length);
            card[col.letter].push(pool[randIndex]);
            pool.splice(randIndex, 1);
        }
    });
    return card;
}

// --- 2. DOM RENDERING ---
let daubedSquares = new Set();
const defaultCards = 1;

// URL Parameter checking on load
window.onload = () => {
    let params = new URLSearchParams(window.location.search);
    let phrase = params.get('phrase');
    if (phrase) {
        document.getElementById('phrase-input').value = phrase.replace(/-/g, ' ');
        buildUI();
    }
    
    let catchup = params.get('catchup');
    if (catchup) {
        document.getElementById('catchup-input').value = catchup.replace(/-/g, ' ');
        setTimeout(applyCatchup, 100);
    }
};

function buildUI() {
    let phrase = document.getElementById('phrase-input').value.trim();
    if (!phrase) return alert("Please enter a phrase!");
    
    const container = document.getElementById('cards-container');
    container.innerHTML = ''; // Clear old cards

    for (let i = 1; i <= defaultCards; i++) {
        let cardData = generateBingoCard(phrase, i);
        let cardElement = createHTMLCard(cardData, i, phrase);
        container.appendChild(cardElement);
    }
}

function createHTMLCard(data, index, phrase) {
    const cardWrap = document.createElement('div');
    cardWrap.className = 'bingo-card';

    // Header (B I N G O)
    const header = document.createElement('div');
    header.className = 'card-header';
    ['B', 'I', 'N', 'G', 'O'].forEach(letter => {
        let div = document.createElement('div');
        div.innerText = letter;
        header.appendChild(div);
    });
    cardWrap.appendChild(header);

    // Grid (5x5)
    const grid = document.createElement('div');
    grid.className = 'card-grid';
    
    const letters = ['B', 'I', 'N', 'G', 'O'];
    
    // We have to iterate rows first, then columns to build the HTML grid properly
    for (let row = 0; row < 5; row++) {
        for (let col = 0; col < 5; col++) {
            let val = data[letters[col]][row];
            let cellKey = `${index}-${col}-${row}`;
            
            let cell = document.createElement('div');
            cell.className = 'grid-cell';
            if (val === "FREE") cell.classList.add('free-space');
            
            // Restore daub state if it exists
            if (daubedSquares.has(cellKey) || val === "FREE") {
                cell.classList.add('daubed');
            }
            
            cell.innerText = val;
            
            // Click Event to manually toggle daubs
            cell.onclick = () => {
                if (cell.classList.contains('daubed')) {
                    cell.classList.remove('daubed');
                    daubedSquares.delete(cellKey);
                } else {
                    cell.classList.add('daubed');
                    daubedSquares.add(cellKey);
                }
            };
            
            grid.appendChild(cell);
        }
    }
    cardWrap.appendChild(grid);

    // Footer
    const footer = document.createElement('div');
    footer.className = 'card-footer';
    footer.innerText = `Seed: ${phrase}-${index}`;
    cardWrap.appendChild(footer);

    return cardWrap;
}

// --- 3. MOCK CATCHUP LOGIC ---
function applyCatchup() {
    let catchupText = document.getElementById('catchup-input').value.trim();
    if (!catchupText) return;
    
    // Since we are simulating the 4-word cipher here, we'll just mock decoding it 
    // by daubing a few random squares just to show the UI interaction works!
    // In your real code, you will drop the `decodeCipher()` function here.
    
    daubedSquares.clear();
    let phrase = document.getElementById('phrase-input').value.trim();
    let letters = ['B', 'I', 'N', 'G', 'O'];
    
    let mockDecodedBalls = [12, 44, 5, 71, 33, 19]; // Fake decoded balls
    
    for (let i = 1; i <= defaultCards; i++) {
        let boardData = generateBingoCard(phrase, i);
        for (let col = 0; col < 5; col++) {
            for (let row = 0; row < 5; row++) {
                let val = boardData[letters[col]][row];
                if (mockDecodedBalls.includes(val) || val === "FREE") {
                    daubedSquares.add(`${i}-${col}-${row}`);
                }
            }
        }
    }
    
    // Rebuild the UI to show the new daubs
    buildUI(); 
}
</script>
</body>
</html>
